<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/fragment/header.css">
    <link rel="stylesheet" href="/css/fragment/footer.css">
    <link rel="stylesheet" href="/css/board/boardList.css">
</head>
<body>

<!-- 헤더 -->
<div th:replace="~{fragment/header :: header}"></div>

<div class="notice-page">
    <!-- 제목 영역 -->
    <div class="notice-header">
        <h1>게시글 목록</h1>
    </div>

    <!-- 게시판 영역 -->
    <div class="notice-board">
        <table class="notice-table">
            <thead>
            <tr>
                <th class="col-no">번호</th>
                <th class="col-title">제목</th>
                <th class="col-writer">작성자</th>
                <th class="col-date">작성일</th>
                <th class="col-view">조회</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="board : ${boardList}">  <!-- 게시물 개수만큼 반복 -->
                <td class="col-no" th:text="${board.bno}">1</td>
                <td class="col-title title-text">
                    <a th:href="|/board/read/${board.bno}|" th:text="${board.title}">게시물 제목</a>
                </td>
                <td class="col-writer" th:text="${board.memberId}">게시글 작성자 이름</td>
                <td class="col-date" th:text="${board.regDate}">작성 일자</td>
                <td class="col-view" th:text="${board.viewCnt}">조회수</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 검색 + 글쓰기 -->
    <form action="/board/list" method="get" class="notice-controls">
        <div class="search-wrap">

            <select name="option">
                <option value="title">제목</option>
                <option value="content">내용</option>
                <option value="all">제목 + 내용</option>
            </select>

            <input type="text" name="keyword">
            <button type="submit" class="search-btn">찾기</button>
        </div>

        <div class="write-wrap">
            <a href="/board/write" class="write-btn">글쓰기</a>
        </div>
    </form>

    <!-- 페이지네이션 -->
    <form action="/board/list" method="get" class="pagination">
        <button type="submit" name="page" th:value="${ph.sc.page - 10}" class="page-btn" th:classappend="${ph.showPrevBlock} ? '' : 'disabled'">❮❮</button>
        <button type="submit" name="page" th:value="${ph.sc.page - 1}" class="page-btn" th:classappend="${ph.showPrev} ? '' : 'disabled'">❮</button>
        <th:block th:each="num : ${#numbers.sequence(ph.beginPage, ph.endPage)}">
            <button type="submit" name="page" th:value="${num}" th:text="${num}" class="page-btn" th:classappend="${num == ph.sc.page} ? 'active' : ''">1</button>
        </th:block>
        <button type="submit" name="page" th:value="${ph.sc.page + 1}" class="page-btn" th:classappend="${ph.showNext} ? '' : 'disabled'">❯</button>
        <button type="submit" name="page" th:value="${ph.sc.page + 10}" class="page-btn" th:classappend="${ph.showNextBlock} ? '' : 'disabled'">❯❯</button>

        <input type="hidden" name="option" th:if="${ph.sc.option != null}" th:value="${ph.sc.option}">
        <input type="hidden" name="keyword" th:if="${ph.sc.keyword != null}" th:value="${ph.sc.keyword}">
    </form>

</div>

<!-- 푸터 -->
<div th:replace="~{fragment/footer :: footer}"></div>

</body>
</html>
