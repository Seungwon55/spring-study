<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/fragment/header.css">
    <link rel="stylesheet" href="/css/fragment/footer.css">
    <link rel="stylesheet" href="/css/error/errorForm.css">
</head>
<body>

<div class="error-container">
    <div class="error-code" th:text="${errorInfo.code}">상태 코드</div>
    <div class="error-title">문제가 발생했습니다.</div>
    <div class="error-message" th:text="${errorInfo.message}">상태 메시지</div>
    <a href="/" class="home-button">홈으로 이동</a>
</div>

</body>
</html>
